<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Untuk Kamu ❤️</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff758c, #ff7eb3, #ffb199);
        overflow: hidden;
      }

      .container {
        width: 90%;
        max-width: 700px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        padding: 40px;
        text-align: center;
        color: white;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        animation: muncul 1.5s;
      }

      h1 {
        font-size: 40px;
        margin-bottom: 20px;
      }

      #text {
        font-size: 22px;
        min-height: 140px;
        line-height: 1.8;
      }

      button {
        margin-top: 25px;
        padding: 12px 30px;
        border: none;
        border-radius: 50px;
        background: white;
        color: #ff4d6d;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.1);
      }

      .heart {
        position: absolute;
        color: white;
        animation: terbang linear forwards;
      }

      @keyframes muncul {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes terbang {
        from {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
        to {
          transform: translateY(-100vh) scale(2);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>❤️ Untuk Kamu ❤️</h1>

      <div id="text"></div>

      <button onclick="nextText()">Lanjut 💕</button>
    </div>

    <script>
      const kata = [
        "Kalau dunia menyuruhku memilih antara bernapas atau mencintaimu, mungkin napas terakhirku akan kupakai untuk bilang kalau aku sayang kamu.",

        "Kamu bukan orang yang sempurna. Tapi entah kenapa, di mataku kamu selalu jadi alasan kenapa aku percaya kalau cinta itu benar-benar ada.",

        "Aku nggak janji akan selalu membuatmu bahagia setiap hari. Tapi aku janji, saat kamu sedih, aku akan tetap tinggal dan menggenggam tanganmu.",

        "Kalau suatu hari nanti kita bertengkar, tolong jangan pernah lupa kalau aku tetap memilih kamu, bukan ego kita.",

        "Aku suka semua tentangmu. Tawamu, manjamu, ngambekmu, cerewetmu, bahkan diammu pun selalu berhasil bikin aku kangen.",

        "Mungkin aku bukan orang paling romantis di dunia. Tapi satu hal yang pasti, aku akan selalu berusaha menjadi orang yang paling tulus mencintaimu.",

        "Kalau ada seribu alasan untuk menyerah, selalu ada satu alasan yang membuatku bertahan. Alasannya adalah kamu.",

        "Aku tidak mencari seseorang yang sempurna. Aku hanya mencari seseorang yang bisa kupanggil 'rumah'. Dan rumah itu adalah kamu.",

        "Terima kasih sudah hadir di hidupku. Karena sejak mengenalmu, kata 'bahagia' akhirnya punya wajah.",

        "Semoga nanti, setelah semua mimpi kita tercapai, aku masih bisa menggenggam tangan yang sama. Tanganmu.",
      ];

      let index = 0;
      let huruf = 0;

      function ketik() {
        if (huruf < kata[index].length) {
          document.getElementById("text").innerHTML +=
            kata[index].charAt(huruf);

          huruf++;

          setTimeout(ketik, 35);
        }
      }

      function nextText() {
        index++;

        if (index >= kata.length) {
          index = 0;
        }

        huruf = 0;

        document.getElementById("text").innerHTML = "";

        ketik();
      }

      ketik();

      setInterval(() => {
        const heart = document.createElement("div");

        heart.className = "heart";

        heart.innerHTML = "❤";

        heart.style.left = Math.random() * 100 + "vw";

        heart.style.fontSize = 20 + Math.random() * 30 + "px";

        heart.style.bottom = "-20px";

        heart.style.animationDuration = 3 + Math.random() * 3 + "s";

        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 6000);
      }, 300);
    </script>
  </body>
</html>
